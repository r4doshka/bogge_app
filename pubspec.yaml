name: bogge_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  envied: ^1.3.3
  envied_generator: ^1.3.3
  auto_route: ^11.1.0
  flutter_hooks: ^0.21.3+1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  connectivity_plus: ^7.0.0
  easy_localization: ^3.0.8
  sliver_tools: ^0.2.12
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2
  auto_route_generator: ^10.5.0
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true

  assets:
  - assets/
  - assets/locales/
  - assets/icons/
  - assets/images/
  - assets/images/launcher/
  - assets/images/splash/
