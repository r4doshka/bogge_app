name: bogge_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  envied: ^1.3.3
  envied_generator: ^1.3.3
  auto_route: ^11.1.0
  flutter_hooks: ^0.21.3+1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  connectivity_plus: ^7.0.0
  easy_localization: ^3.0.8
  sliver_tools: ^0.2.12
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2
  auto_route_generator: ^10.5.0
  riverpod_annotation: ^4.0.2
  hooks_riverpod: ^3.3.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  reactive_forms: ^18.2.2
  url_launcher: ^6.3.2
  pin_code_fields: ^9.3.0
  string_extensions: ^0.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

  # dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  adaptive_icon_background: "assets/images/launcher/background.png"
  adaptive_icon_foreground: "assets/images/launcher/foreground.png"
  image_path: "assets/images/launcher/logo.png"
  adaptive_icon_foreground_inset: 22
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# dart run flutter_native_splash:create
flutter_native_splash:
  image: assets/images/splash/logo_splash.png
  color: "#A0816C"

  android_12:
    image: assets/images/splash/logo_splash.png
    color: "#A0816C"
    icon_background_color: "#A0816C"
  web: false
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
  - assets/
  - assets/locales/
  - assets/icons/
  - assets/images/
  - assets/images/launcher/
  - assets/images/splash/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Black.ttf
          weight: 900
        - asset: assets/fonts/inter/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter_18pt-Regular.ttf
          weight: 400
